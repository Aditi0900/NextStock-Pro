services:
  db:
    image: postgres:15-alpine
    container_name: nexstock_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexstock}
      POSTGRES_USER: ${POSTGRES_USER:-nexstock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexstock_user} -d ${POSTGRES_DB:-nexstock}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexstock_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexstock_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexstock_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nexstock}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nexstock_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: nexstock_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexstock_net

volumes:
  postgres_data:
    name: nexstock_postgres_data

networks:
  nexstock_net:
    driver: bridge
